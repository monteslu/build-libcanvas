name: Build libcanvas

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04
          - platform: linux-aarch64
            runner: ubuntu-22.04-arm
          - platform: android-aarch64
            runner: ubuntu-22.04
          - platform: macos-x86_64
            runner: macos-13
          - platform: macos-aarch64
            runner: macos-14
          - platform: windows-x86_64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with: { node-version: 22 }

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # libaom (AVIF) needs nasm. ilammy/setup-nasm is node20-only (no node24
      # release), so install nasm directly per-OS. ubuntu-22.04 apt ships nasm
      # 2.15 (libaom-safe); macOS brew + Windows choco supply current builds.
      - name: Install nasm
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   sudo apt-get update && sudo apt-get install -y nasm ;;
            macOS)   brew list nasm >/dev/null 2>&1 || brew install nasm ;;
            Windows) choco install nasm -y && echo "C:\\Program Files\\NASM" >> "$GITHUB_PATH" ;;
          esac
          nasm --version || true

      # Skia is now built FROM SOURCE with the Ganesh GL backend (upstream's
      # prebuilt skia-<sha> archives are CPU-only). That needs ninja (gn is
      # fetched by build.sh via skia/bin/fetch-gn) and a python3 for the Skia
      # build tooling (git-sync-deps / gn). git-sync-deps skips the emsdk hook
      # (GIT_SYNC_DEPS_SKIP_EMSDK, set in build.sh).
      - name: Install Skia build tools (ninja)
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   sudo apt-get install -y ninja-build python3 ;;
            macOS)   brew list ninja >/dev/null 2>&1 || brew install ninja ;;
            Windows) choco install ninja -y ;;
          esac
          ninja --version || true

      # canvas build.rs hardcodes /usr/lib/llvm-19/{lib,include/c++/v1} and
      # links static libc++/libc++abi — install the matching LLVM 19 toolchain.
      - name: Install LLVM 19 + static libc++ (linux/android hosts)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt-get install -y libc++-19-dev libc++abi-19-dev
          # canvas build.rs feeds clang the llvm-19 libc++ headers; the compiler
          # MUST be clang-19 too (default clang is older and can't parse them).
          # Android sets its own NDK CC/CXX afterward, overriding these.
          echo "CC=clang-19" >> "$GITHUB_ENV"
          echo "CXX=clang++-19" >> "$GITHUB_ENV"

      - name: Setup (android)
        if: matrix.platform == 'android-aarch64'
        run: |
          # upstream's NDK libgcc/unwind shim (their CI does the same)
          CLANG_VERSION=$(ls ${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/lib/clang | sed 's/ *$//g')
          LIBDIR=${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/lib/clang/${CLANG_VERSION}/lib/linux/aarch64
          mkdir -p "$LIBDIR"
          echo "INPUT(-lunwind)" > "$LIBDIR/libgcc.a"
          TOOLBIN=${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin
          # build.rs links `static=c++`. The NDK's .../<api>/libc++.a is a
          # LINKER SCRIPT (INPUT(...)), which rustc's static bundler rejects
          # ("failed to add native library"). Stage the REAL static archives
          # as libc++.a / libc++abi.a in a dir we control and search it first.
          NDKLIB=${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android
          SYSLIB=$RUNNER_TEMP/ndk-cxx
          mkdir -p "$SYSLIB"
          cp "$NDKLIB/libc++_static.a" "$SYSLIB/libc++.a"
          cp "$NDKLIB/libc++abi.a" "$SYSLIB/libc++abi.a"
          {
            echo "CC=$TOOLBIN/aarch64-linux-android24-clang"
            echo "CXX=$TOOLBIN/aarch64-linux-android24-clang++"
            echo "AR=$TOOLBIN/llvm-ar"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLBIN/aarch64-linux-android24-clang"
            echo "LDFLAGS=-fuse-ld=lld"
            echo "RUSTFLAGS=-L$SYSLIB"
          } >> "$GITHUB_ENV"

      - name: Setup (macos)
        if: startsWith(matrix.platform, 'macos')
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: PLATFORM=${{ matrix.platform }} ./build.sh

      - uses: actions/upload-artifact@v7
        with:
          name: libcanvas-${{ matrix.platform }}
          path: out/libcanvas-${{ matrix.platform }}.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with: { merge-multiple: true }
      - uses: softprops/action-gh-release@v3
        with:
          files: libcanvas-*.tar.gz
